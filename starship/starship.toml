# Starship 配置文件 - Nerd Font Symbols 预设
# 文档: https://starship.rs/config/
"$schema" = 'https://starship.rs/config-schema.json'

# ===== 云服务 =====

# AWS - 显示当前 AWS 区域和配置文件
[aws]
symbol = " "

# Azure - 显示当前 Azure 订阅
[azure]
symbol = " "

# Google Cloud - 显示当前 GCP 项目和区域
[gcloud]
symbol = "󱇶 "

# OpenStack - 显示当前 OpenStack 云和项目
[openstack]
symbol = " "

# ===== 电池 =====

# 电池 - 显示电池电量和充电状态
[battery]
full_symbol = "󰁹 "          # 满电
charging_symbol = "󰂄 "      # 充电中
discharging_symbol = "󰂃 "   # 放电中
unknown_symbol = "󰂑 "       # 未知状态
empty_symbol = "󰂎 "         # 电量耗尽

