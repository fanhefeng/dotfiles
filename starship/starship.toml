# ===== Shell & 系统 =====

# 目录 - 当前路径显示，只读目录会显示锁图标
[directory]
truncation_length = 0
truncate_to_repo = false
read_only = " 󰌾"

# direnv - 自动加载 .envrc 环境变量
[direnv]
symbol = " "

# Guix Shell - GNU Guix 包管理器 shell
